{% extends 'layout/base.html' %}
{% import 'macros/hotkeys.html' as hk %}

{% block upper_left %}
    <nav class="nav-container">
        {{ hk.page_overview() }}
        <span class="separator">|</span>
        {{ hk.page_main_setup() }}
    </nav>
{% endblock %}

{% block content %}
    <h2>{{ message }}</h2>
    {% if details is defined %}
        <div class="label-like">{{ details }}</div>
    {% endif %}
{% endblock %}
