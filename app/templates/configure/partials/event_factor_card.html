<div class="factor-card outer-border" data-index="{{ index }}">
    {% set infield = factor.infield %}
    <div class="flex-row gap-20 align-center">
        <span class="index-display label-like">#{{ index }}</span>
        <button type="button" class="btn-sm dangerous-button" onclick="this.closest('.factor-card').remove(); renumberLabels();">×</button>
    </div>

    <div class="card-body">
        <!-- WHAT (Field) -->
        <h5>📊 Value to Fetch</h5>
        <div class="sub-section">
            <div class="flex-row align-center gap-10">
                <span style="margin-top: 4px">Role:</span>
                <input name="dets[{{ index }}][role]"
                    list="role-list"
                    class="role-selector"
                    value="{{ infield.role if infield else '' }}"
                    onfocus="this.dataset.original = this.value"
                    onblur="handleRoleInput(this)"
                    onkeydown="handleRoleKeydown(event, this)"
                    placeholder="e.g. Target_Enemy"
                    style="max-width: 30ch;">

                <span style="margin-top: 4px">Label:</span>
                <input type="text" 
                       name="dets[{{ index }}][label]" 
                       value="{{ factor.label or '' }}" 
                       placeholder="e.g. Evasion (use of Dex)">
            </div>

            <div class="flex-row align-center gap-10">
                <select name="dets[{{ index }}][field_mode]" class="full-width" style="max-width: 30ch;" onchange="fieldTargetVisibility(this, {{ index }})">
                    <option value="attr" {{ 'selected' if infield and infield.field_mode == 'attr' }}>Attribute Value</option>
                    <option value="qty" {{ 'selected' if infield and infield.field_mode == 'qty' }}>Item Quantity</option>
                </select>

                <!-- Attribute Dropdown -->
                <select name="dets[{{ index }}][attrib_id]" 
                        class="target-attr full-width {{ 'hidden' if infield and infield.field_mode == 'qty' }}" style="max-width: 30ch;">
                    <option value="">-- Select Attribute --</option>
                    {% for a in all_attribs %}
                        <option value="{{ a.id }}" {{ 'selected' if infield and infield.attrib_id == a.id }}>{{ a.name }}</option>
                    {% endfor %}
                </select>

                <!-- Item Dropdown -->
                <select name="dets[{{ index }}][item_id]" 
                        class="target-item full-width {{ 'hidden' if infield and infield.field_mode != 'qty' }}" style="max-width: 30ch;">
                    <option value="">-- Select Item --</option>
                    {% for i in all_items %}
                        <option value="{{ i.id }}" {{ 'selected' if infield and infield.item_id == i.id }}>{{ i.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <label class="checkbox-label spacious-top">
                <input type="checkbox" name="dets[{{ index }}][child_of_anchor]" {{ 'checked' if infield and infield.child_of_anchor }}>
                An item in source's inventory
            </label>
        </div>

        <!-- HOW (Math) -->
        <h5>🧮 Calculation</h5>
        <div class="sub-section">
            <div class="flex-row align-center gap-10">

                <div class="inner-expr-group flex-row align-center gap-5" data-inner-group>
                    <span style="font-size: 2em; order: 0;">(</span>
                    
                    <span data-slot-lhs style="font-style: italic">FetchedValue</span>

                    <select name="dets[{{ index }}][op_transform]" 
                            class="op-inner-selector"
                            style="max-width: 15ch;"
                            onchange="innerExprVisibility(this.closest('.factor-card'))">
                        <option value="k">← Constant</option>
                        <option value="" {{ 'selected' if not factor.op_transform }}>← Fetched</option>
                        {% for op_key in Operation.TRANSFORM_OPS %}
                            {% set info = Operation.Repr.get(op_key) %}
                            <option value="{{ op_key }}" {{ 'selected' if factor.op_transform == op_key }}>
                                {{ info.symbol }}
                            </option>
                        {% endfor %}
                    </select>

                    <div data-slot-rhs class="flex-row align-center gap-5">
                        <input type="number" 
                               name="dets[{{ index }}][val_transform]" 
                               data-input-constant
                               value="{{ factor.val_transform or 1.0 }}" 
                               step="any" 
                               style="max-width: 8ch;">
                    </div>

                    <span style="font-size: 2em; order: 4;">)</span>
                </div>

                <select name="dets[{{ index }}][op_application]" 
                        class="op-application-selector" 
                        style="max-width: 8ch;"
                        onchange="outerExprVisibility(this.closest('.factor-card'))">
                    {% for op_key in Operation.APPLICATION_OPS %}
                        {% set info = Operation.Repr.get(op_key) %}
                        <option value="{{ op_key }}" {{ 'selected' if factor.op_application == op_key }}>
                            {{ info.symbol }}
                        </option>
                    {% endfor %}
                </select>

                <div data-slot-required class="flex-row align-center gap-5 hidden">
                    <input type="number" 
                           name="dets[{{ index }}][val_required]" 
                           value="{{ factor.val_required or 0.0 }}" 
                           step="any" 
                           style="max-width: 8ch;">
                </div>

            </div>
        </div>
    </div>
</div>
