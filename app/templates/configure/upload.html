{% extends 'layout/base.html' %}

{% block content %}
<div class="session-card outer-border" style="max-width: 600px; margin: 40px auto;">
    <h1>Load Scenario Data</h1>
    <p class="label-like">Upload a JSON scenario file to restore or change a game state.</p>
    <div class="warning-box spacious-top">
        <strong>Warning:</strong> Erases all current data. This cannot be undone.
    </div>
    <br/>

    <div class="upload-zone spacious-top" id="drop-zone">
        <form action="{{ url_for('configure.upload') }}" method="POST" enctype="multipart/form-data">
            <div class="flex-column align-center gap-10">
                <span style="font-size: 3em;">📄</span>
                <p>Drag and drop your <strong>.json</strong> file here</p>
                <p class="label-like">or</p>
                <input type="file" name="file" accept=".json" required id="file-input">
                <div class="spacious-top">
                    <button type="submit" class="go-button" style="padding: 10px 40px;">[U]pload & Initialize</button>
                </div>
            </div>
        </form>
    </div>

    <div class="divider-horizontal">OR</div>

    <div class="blank-start-area">
        <form action="{{ url_for('configure.clear_all') }}" method="POST" enctype="multipart/form-data">
        <p>Start from scratch with an empty world.</p>
        <button type="submit" class="dangerous-button">
            ✨ Initialize Blank Setup
        </button>
    </div>

</div>

<script>
    // Simple Hotkey for Upload
    document.addEventListener('keypress', (e) => {
        if (e.key.toLowerCase() === 'u') {
            document.querySelector('button[type="submit"]').click();
        }
    });

    // Drag and Drop Visual Feedback
    const dz = document.getElementById('drop-zone');
    dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.style.borderColor = 'var(--accent)'; });
    dz.addEventListener('dragleave', (e) => { dz.style.borderColor = 'var(--border)'; });
</script>

<style>
    .upload-zone {
        border: 2px dashed var(--border);
        padding: 40px;
        text-align: center;
        border-radius: 8px;
        background: #111;
        transition: border-color 0.3s;
    }
    .warning-box {
        background: #2a0000;
        padding: 10px;
    }
    .gap-10 { gap: 10px; }
</style>
{% endblock %}
