<div id="interrupt-modal" class="modal" style="display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8);">
    <div class="modal-content outer-border" style="margin: 15% auto; padding: 20px; max-width: 400px; background: #222; text-align: center;">
        <h2 class="text-accent">⚠️ Interrupt!</h2>
        <p id="interrupt-message"></p>
        <div class="spacious-top">
            <button id="interrupt-go-btn" class="go-button">Investigate Event</button>
        </div>
    </div>
</div>

<script>
function showInterruptModal(data) {
    const modal = document.getElementById('interrupt-modal');
    document.getElementById('interrupt-message').innerText = data.message;
    modal.style.display = 'block';

    document.getElementById('interrupt-go-btn').onclick = function() {
        window.location.href = `/play/event/${data.event_id}?source_id=${typeof ownerId !== 'undefined' ? ownerId : ''}`;
    };
}
</script>
